<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1c1c1c">
<title>תפעול · קרוספיט באקס</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="תפעול באקס">

<style>
:root{
  --bg:#1c1c1c; --card:#262626; --card2:#2f2f2f; --line:#3a3a3a;
  --orange:#fdab3d; --orange-dim:#c9832d;
  --text:#f4f4f4; --muted:#9a9a9a;
  --green:#3fb950; --yellow:#f1c93b; --red:#f26d6d; --blue:#6db3f2;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Rubik,Arial,sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5;
  padding-bottom:env(safe-area-inset-bottom);
  -webkit-text-size-adjust:100%; text-size-adjust:100%;
}
button{font-family:inherit;touch-action:manipulation}
input,textarea,select{font-family:inherit}
a,button,.check,.action,.staff-btn,.seg-b,.tab,.sub-tab{touch-action:manipulation}
.hidden{display:none!important}
/* באנר אופליין */
#offline{position:fixed;top:0;left:0;right:0;z-index:80;background:var(--red);color:#3a0e0e;
  text-align:center;font-weight:800;font-size:13.5px;padding:calc(env(safe-area-inset-top) + 7px) 10px 7px;
  transform:translateY(-100%);transition:transform .2s}
#offline.show{transform:translateY(0)}

/* ===== התחברות ===== */
#screen-login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 18px}
.brand{text-align:center;margin-bottom:26px}
.brand .logo{width:74px;height:74px;border-radius:20px;margin:0 auto 12px;
  background:linear-gradient(135deg,var(--orange),#e6941f);display:flex;align-items:center;
  justify-content:center;font-size:38px;box-shadow:0 8px 24px rgba(253,171,61,.28)}
.brand h1{margin:0;font-size:22px;font-weight:800;letter-spacing:.3px}
.brand p{margin:4px 0 0;color:var(--muted);font-size:14px}
.who{width:100%;max-width:440px}
.who h2{font-size:15px;color:var(--muted);font-weight:600;margin:0 0 12px;text-align:center}
.staff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.staff-btn{background:var(--card);border:1px solid var(--line);color:var(--text);padding:16px 12px;
  border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:6px;transition:.12s}
.staff-btn:active{transform:scale(.97)}
.staff-btn .rl{font-size:12px;font-weight:600;color:var(--muted)}
.staff-btn .av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;color:#1c1c1c}
#pin-wrap{width:100%;max-width:360px;text-align:center}
#pin-wrap .name{font-size:20px;font-weight:800;margin-bottom:2px}
#pin-wrap .sub{color:var(--muted);font-size:14px;margin-bottom:18px}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:22px}
.pin-dots .d{width:16px;height:16px;border-radius:50%;border:2px solid var(--orange)}
.pin-dots .d.on{background:var(--orange)}
.pin-dots.err .d{border-color:var(--red);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:280px;margin:0 auto}
.pad button{aspect-ratio:1/1;border-radius:50%;border:1px solid var(--line);background:var(--card);
  color:var(--text);font-size:26px;font-weight:700;cursor:pointer}
.pad button:active{background:var(--card2)}
.pad .ghost{background:transparent;border:none}
.stay{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;color:var(--muted);font-size:14px}
.stay input{width:18px;height:18px;accent-color:var(--orange)}
.link-btn{background:none;border:none;color:var(--orange);font-size:14px;cursor:pointer;margin-top:16px}

/* ===== מסגרת אפליקציה ===== */
#screen-app{max-width:560px;margin:0 auto;min-height:100vh}
.topbar{position:sticky;top:0;z-index:5;background:rgba(28,28,28,.94);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
  display:flex;align-items:center;gap:12px}
.topbar .av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;color:#1c1c1c;font-size:16px;flex:0 0 auto}
.topbar .who-t{flex:1;min-width:0}
.topbar .who-t .n{font-weight:800;font-size:16px}
.topbar .who-t .r{color:var(--muted);font-size:12.5px}
.topbar .out{background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:10px;
  padding:8px 10px;font-size:13px;cursor:pointer}
.content{padding:16px 16px 48px}

/* כותרת מסך פנימי */
.vhead{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.vhead .back{background:var(--card);border:1px solid var(--line);color:var(--text);width:40px;height:40px;
  border-radius:12px;font-size:20px;cursor:pointer;flex:0 0 auto}
.vhead h2{margin:0;font-size:20px;font-weight:800}
.vhead .sub{font-size:12.5px;color:var(--muted);font-weight:500}
.vhead .spc{flex:1}
.vhead .refresh{background:var(--card);border:1px solid var(--line);color:var(--orange);width:40px;height:40px;
  border-radius:12px;font-size:18px;cursor:pointer;flex:0 0 auto}
.vhead .refresh:active{transform:rotate(90deg)}

/* באנר משמרת + סקשנים + פעולות בית */
.shift-banner{border-radius:14px;padding:12px 14px;margin-bottom:18px;font-weight:700;display:flex;
  align-items:center;gap:10px;font-size:14.5px}
.shift-banner.morning{background:rgba(241,201,59,.14);border:1px solid rgba(241,201,59,.35);color:var(--yellow)}
.shift-banner.evening{background:rgba(253,171,61,.14);border:1px solid rgba(253,171,61,.35);color:var(--orange)}
.shift-banner.off{background:var(--card);border:1px solid var(--line);color:var(--muted)}
.shift-banner .big{font-size:20px}
.sec-title{font-size:13px;color:var(--muted);font-weight:700;margin:22px 2px 10px;letter-spacing:.4px}
.sec-title:first-of-type{margin-top:6px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.action{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 14px;text-align:right;
  color:var(--text);cursor:pointer;position:relative;display:flex;flex-direction:column;gap:8px;min-height:104px;transition:.12s}
.action:active{transform:scale(.98);background:var(--card2)}
.action .ic{font-size:26px}
.action .lb{font-weight:800;font-size:15px;line-height:1.25}
.action .ds{font-size:12px;color:var(--muted);font-weight:500}
.action.wide{grid-column:1/-1;flex-direction:row;align-items:center;min-height:auto}
.action.wide .ic{font-size:24px}
.action.primary{border-color:var(--orange-dim);background:linear-gradient(160deg,rgba(253,171,61,.16),var(--card))}
.action .cnt{position:absolute;top:10px;left:10px;background:var(--red);color:#fff;font-size:11px;font-weight:800;
  min-width:20px;height:20px;border-radius:20px;display:flex;align-items:center;justify-content:center;padding:0 5px}

/* ===== טפסים ===== */
.form{display:flex;flex-direction:column;gap:2px}
.field{margin-bottom:16px}
.field > label{display:block;font-size:14px;font-weight:700;margin-bottom:8px}
.field .req{color:var(--orange)}
.field .hint{font-size:12px;color:var(--muted);font-weight:500;margin:0 0 8px}
input[type=text],input[type=number],input[type=date],textarea,select{
  width:100%;background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:12px;
  padding:13px 14px;font-size:16px;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--orange)}
textarea{min-height:80px;resize:vertical;line-height:1.5}
.seg{display:flex;flex-wrap:wrap;gap:8px}
.seg-b{background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:11px;padding:11px 14px;
  font-size:14px;font-weight:600;cursor:pointer;flex:1;min-width:74px;text-align:center;transition:.1s}
.seg-b:active{transform:scale(.97)}
.seg-b.sel{background:var(--orange);border-color:var(--orange);color:#1c1c1c;font-weight:800}
.seg.yn .seg-b{flex:1}
.submit{width:100%;background:var(--orange);color:#1c1c1c;border:none;border-radius:14px;padding:16px;
  font-size:17px;font-weight:800;cursor:pointer;margin-top:10px}
.submit:active{transform:scale(.99)}
.submit[disabled]{opacity:.5}

/* צ'קליסט */
.check-list{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.check{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;display:flex;
  align-items:flex-start;gap:12px;cursor:pointer;transition:.1s}
.check .box{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:0 0 auto;display:flex;
  align-items:center;justify-content:center;font-size:15px;color:#1c1c1c;margin-top:1px}
.check.on{border-color:var(--green);background:rgba(63,185,80,.08)}
.check.on .box{background:var(--green);border-color:var(--green)}
.check .txt{font-size:14.5px;font-weight:600}
.check .help{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px}
.check-progress{font-size:13px;color:var(--muted);margin-bottom:12px;font-weight:600}

/* רובריקה (הערכת מאמן) */
.rubric{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.rubric .rt{font-weight:800;font-size:14.5px;margin-bottom:2px}
.rubric .rw{font-size:11.5px;color:var(--muted);font-weight:600;margin-bottom:10px}
.rubric .nums{display:flex;gap:8px}
.rubric .nb{flex:1;aspect-ratio:1.3/1;border:1px solid var(--line);background:var(--card2);color:var(--text);
  border-radius:10px;font-size:18px;font-weight:800;cursor:pointer}
.rubric .nb.sel{background:var(--orange);border-color:var(--orange);color:#1c1c1c}
.rubric .rl{font-size:12.5px;color:var(--orange);font-weight:600;margin-top:9px;min-height:17px}
.score-box{position:sticky;bottom:12px;background:var(--card2);border:1px solid var(--orange-dim);border-radius:14px;
  padding:14px;margin:6px 0 16px;text-align:center}
.score-box .sv{font-size:30px;font-weight:900;color:var(--orange)}
.score-box .sl{font-size:13px;color:var(--muted);font-weight:600}
.verdict{margin-top:8px;font-size:15px;font-weight:800;padding:8px;border-radius:10px}
.verdict.ok{background:rgba(63,185,80,.15);color:var(--green)}
.verdict.no{background:rgba(242,109,109,.15);color:var(--red)}

/* רשימות / פיד / מלאי / ניהול */
.card-list{display:flex;flex-direction:column;gap:12px}
.rec{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
.rec .rtop{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.rec .who{font-weight:800;font-size:15px}
.rec .meta{font-size:12px;color:var(--muted);font-weight:500}
.rec .spacer{flex:1}
.chip{font-size:11.5px;font-weight:800;padding:4px 9px;border-radius:20px;white-space:nowrap}
.chip.morning{background:rgba(241,201,59,.16);color:var(--yellow)}
.chip.evening{background:rgba(253,171,61,.16);color:var(--orange)}
.chip.pending{background:rgba(253,171,61,.16);color:var(--orange)}
.chip.done{background:rgba(63,185,80,.15);color:var(--green)}
.chip.injury{background:rgba(242,109,109,.18);color:var(--red)}
.chip.trial-chip{background:rgba(109,179,242,.16);color:var(--blue)}
.chip.gray{background:var(--card2);color:var(--muted)}
.rec .row{font-size:13.5px;margin:5px 0;display:flex;gap:6px}
.rec .row b{color:var(--muted);font-weight:700;flex:0 0 auto}
.rec .handoff{background:rgba(253,171,61,.09);border:1px solid rgba(253,171,61,.25);border-radius:10px;
  padding:10px 12px;margin-top:8px;font-size:14px}
.rec .handoff b{color:var(--orange);display:block;font-size:12px;margin-bottom:2px}
.rec .trial{background:rgba(109,179,242,.09);border:1px solid rgba(109,179,242,.28);border-radius:10px;
  padding:10px 12px;margin-top:8px;font-size:13.5px}
.rec .trial b.h{color:var(--blue);display:block;font-size:12px;margin-bottom:3px}
.mark-done{width:100%;margin-top:10px;background:var(--green);color:#0d2a12;border:none;border-radius:11px;
  padding:12px;font-weight:800;font-size:14.5px;cursor:pointer}
.seen-btn{width:100%;margin-top:10px;background:var(--card2);color:var(--blue);border:1px solid rgba(109,179,242,.4);
  border-radius:11px;padding:11px;font-weight:800;font-size:14px;cursor:pointer}
.seen-done{margin-top:10px;text-align:center;color:var(--green);font-weight:700;font-size:13.5px}
/* סרגל תאריכים בפיד */
.datebar{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.datebar input{flex:1}
.db-clear{background:var(--card);border:1px solid var(--line);color:var(--orange);border-radius:12px;
  padding:0 14px;height:48px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;flex:0 0 auto}
.date-sep{font-size:13px;font-weight:800;color:var(--orange);margin:6px 2px 2px;letter-spacing:.3px}
.date-sep:first-child{margin-top:0}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:15px}
.empty .e{font-size:40px;display:block;margin-bottom:10px}

/* מצב מלאי */
.inv-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:13px 14px}
.inv-row.out{border-color:rgba(242,109,109,.5);background:rgba(242,109,109,.07)}
.inv-row.low{border-color:rgba(241,201,59,.4)}
.inv-row .dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto}
.inv-row .dot.ok{background:var(--green)} .inv-row .dot.low{background:var(--yellow)} .inv-row .dot.out{background:var(--red)}
.inv-row .nm{font-weight:700;font-size:14.5px;flex:1}
.inv-row .st{font-size:12.5px;font-weight:800}
.inv-row .st.ok{color:var(--green)} .inv-row .st.low{color:var(--yellow)} .inv-row .st.out{color:var(--red)}
.inv-row .st.na{color:var(--muted)}
.inv-row .restock{margin-inline-start:8px;background:var(--card2);border:1px solid var(--line);color:var(--green);
  border-radius:9px;padding:6px 10px;font-size:12.5px;font-weight:800;cursor:pointer;flex:0 0 auto}

/* ===== שעון עבודה ===== */
.clock{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 16px;margin-bottom:18px;text-align:center}
.clock.on{border-color:var(--green);background:linear-gradient(160deg,rgba(63,185,80,.12),var(--card))}
.clk-state{font-size:13.5px;color:var(--muted);font-weight:700;margin-bottom:8px}
.clock.on .clk-state{color:var(--green)}
.clk-time{font-size:40px;font-weight:900;color:var(--green);font-variant-numeric:tabular-nums;letter-spacing:1px;margin-bottom:12px}
.clk-btn{width:100%;border:none;border-radius:13px;padding:15px;font-size:17px;font-weight:800;cursor:pointer}
.clk-btn.start{background:var(--green);color:#0d2a12}
.clk-btn.stop{background:var(--red);color:#3a0e0e}

/* ===== מדרגות כמות (עדכון מלאי) ===== */
.inv-take{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px}
.inv-take.order{border-color:rgba(242,109,109,.5);background:rgba(242,109,109,.06)}
.inv-take.low{border-color:rgba(241,201,59,.4)}
.inv-take .it-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.inv-take .nm{font-weight:800;font-size:15px;flex:1}
.inv-take .left{font-size:13px;font-weight:800}
.stepper{display:flex;align-items:center;gap:10px;justify-content:flex-end}
.stepper .stp-lbl{font-size:13px;color:var(--muted);font-weight:600;flex:1}
.stepper .stp{width:44px;height:44px;border-radius:12px;border:1px solid var(--line);background:var(--card2);
  color:var(--orange);font-size:24px;font-weight:800;cursor:pointer;flex:0 0 auto}
.stepper .take{width:60px;text-align:center;font-size:20px;font-weight:800;padding:10px 4px;flex:0 0 auto}
.copy-box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;font-size:15px;
  font-weight:600;line-height:1.9;margin-bottom:12px}
.adm-row .qm{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);flex:0 0 auto}
.adm-row .qm input{width:56px;text-align:center}

/* דשבורד */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 14px;text-align:center}
.kpi .v{font-size:30px;font-weight:900}
.kpi .l{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px}
.kpi.alert{border-color:rgba(242,109,109,.4)} .kpi.alert .v{color:var(--red)}
.kpi.good .v{color:var(--green)}

/* ניהול */
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:11px;
  padding:11px;font-size:14px;font-weight:700;cursor:pointer}
.tab.sel{background:var(--orange);border-color:var(--orange);color:#1c1c1c;font-weight:800}
.adm-row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
.adm-row .r1{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.adm-row input,.adm-row select{padding:9px 11px;font-size:16px}
.adm-row .del{background:rgba(242,109,109,.13);border:1px solid rgba(242,109,109,.3);color:var(--red);
  border-radius:9px;padding:8px 11px;font-size:13px;font-weight:700;cursor:pointer;flex:0 0 auto}
.adm-row .save{background:var(--green);border:none;color:#0d2a12;border-radius:9px;padding:8px 13px;
  font-size:13px;font-weight:800;cursor:pointer;flex:0 0 auto}
.adm-row .toggle{flex:0 0 auto;display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted)}
.adm-row .toggle input{width:18px;height:18px;accent-color:var(--orange)}
.add-btn{width:100%;background:var(--card);border:1.5px dashed var(--line);color:var(--orange);border-radius:12px;
  padding:14px;font-size:14.5px;font-weight:700;cursor:pointer;margin-top:4px}
.sub-tabs{display:flex;gap:6px;margin-bottom:12px}
.sub-tab{flex:1;background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:9px;
  padding:8px;font-size:13px;font-weight:600;cursor:pointer}
.sub-tab.sel{background:var(--card2);color:var(--orange);border-color:var(--orange-dim)}

/* מודל / טוסט */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;align-items:flex-end;
  justify-content:center;animation:fade .15s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--card);width:100%;max-width:560px;border-radius:22px 22px 0 0;
  padding:26px 22px calc(30px + env(safe-area-inset-bottom));border-top:1px solid var(--line);animation:up .2s}
@keyframes up{from{transform:translateY(40px)}to{transform:translateY(0)}}
.sheet .grip{width:40px;height:4px;background:var(--line);border-radius:4px;margin:0 auto 18px}
.sheet h3{margin:0 0 6px;font-size:22px;text-align:center}
.sheet p{margin:0 0 20px;color:var(--muted);font-size:14.5px;text-align:center}
.sheet .ok{width:100%;background:var(--orange);color:#1c1c1c;border:none;border-radius:14px;padding:15px;
  font-size:16px;font-weight:800;cursor:pointer}
.toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  background:var(--green);color:#0d2a12;padding:12px 20px;border-radius:12px;font-weight:800;font-size:14.5px;
  z-index:60;box-shadow:0 6px 20px rgba(0,0,0,.4);animation:fade .15s}
.foot{text-align:center;color:#5a5a5a;font-size:12px;padding:24px 0 30px}
.foot .heart{color:var(--orange)}
.loading{text-align:center;color:var(--muted);padding:50px;font-size:15px}
</style>
</head>
<body>
<div id="offline">📴 אין חיבור לאינטרנט — נתונים לא יישמרו עד שהחיבור יחזור</div>

<!-- =================== התחברות =================== -->
<section id="screen-login">
  <div class="brand"><div class="logo">🏋️</div>
    <h1>תפעול · קרוספיט באקס</h1>
    <p>המקום שבו המשמרות מדברות זו עם זו</p></div>
  <div class="who" id="who-pick">
    <h2>מי מתחבר/ת? 🧡</h2>
    <div class="staff-grid" id="staff-grid"></div>
  </div>
  <div class="who hidden" id="pin-wrap">
    <div class="name" id="pin-name"></div>
    <div class="sub">הקש/י את הקוד האישי (4 ספרות)</div>
    <div class="pin-dots" id="pin-dots"><div class="d"></div><div class="d"></div><div class="d"></div><div class="d"></div></div>
    <div class="pad" id="pad"></div>
    <label class="stay"><input type="checkbox" id="stay" checked> הישאר/י מחובר/ת במכשיר הזה</label>
    <button class="link-btn" onclick="backToPick()">← חזרה לרשימה</button>
  </div>
</section>

<!-- =================== אפליקציה =================== -->
<section id="screen-app" class="hidden">
  <div class="topbar">
    <div class="av" id="t-av"></div>
    <div class="who-t"><div class="n" id="t-name"></div><div class="r" id="t-role"></div></div>
    <button class="out" onclick="logout()">יציאה</button>
  </div>
  <div class="content" id="view"></div>
  <div class="foot">קרוספיט באקס · תפעול <span class="heart">🧡</span></div>
</section>

<script>
/* ============================================================
   ⚙️ ענן (Firebase RTDB) — הכל מסונכרן לכל הצוות
   ============================================================ */
const CLOUD = {
  base: "https://command-center-gal-default-rtdb.europe-west1.firebasedatabase.app",
  node: "bux-ops"
};
const U = p => `${CLOUD.base}/${CLOUD.node}/${p}.json`;
async function cGet(p){ try{const r=await fetch(U(p));if(!r.ok)throw 0;return await r.json();}catch(e){return null;} }
async function cWrite(method,p,o){ const r=await fetch(U(p),{method,body:o?JSON.stringify(o):undefined});
  if(!r.ok) throw new Error('net'); return method==='DELETE'?true:await r.json(); }
const cPush =(p,o)=>cWrite('POST',p,o);
const cPut  =(p,o)=>cWrite('PUT',p,o);
const cPatch=(p,o)=>cWrite('PATCH',p,o);
const cDel  =(p)=>cWrite('DELETE',p);

/* גיבוי מקומי (אם הענן ריק) */
const FALLBACK_STAFF = {
  s1:{name:"גל זוהר",role:"manager",pin:"1000",active:true,order:1},
  s2:{name:"רחל זוהר",role:"manager",pin:"2000",active:true,order:2},
  s3:{name:"וולנטינה",role:"sales",pin:"3000",active:true,order:3},
  s4:{name:"שיר",role:"coach",pin:"1111",active:true,order:4},
  s5:{name:"פיני",role:"coach",pin:"2222",active:true,order:5},
  s6:{name:"טל",role:"coach",pin:"3333",active:true,order:6},
  s7:{name:"טלי",role:"coach",pin:"4444",active:true,order:7},
  s8:{name:"קורן",role:"coach",pin:"5555",active:true,order:8},
  s9:{name:"אריאל",role:"helper",pin:"6666",active:true,order:9,rate:30},
};
const ROLES = {
  manager:{he:"ניהול",color:"#fdab3d"}, coach:{he:"מאמן/ת",color:"#3fb950"},
  sales:{he:"שירות ומכירה",color:"#f1c93b"}, helper:{he:"נער עזר",color:"#6db3f2"},
};

/* ============================================================
   פעולות הבית לפי תפקיד
   ============================================================ */
const ACTIONS = {
  do:{
    'checklist-open': {ic:"🌅",lb:"צ'קליסט פתיחה",ds:"פתיחת משמרת"},
    'checklist-close':{ic:"🌙",lb:"צ'קליסט סגירה",ds:"סגירת משמרת"},
    'shift-summary':  {ic:"📋",lb:"סיכום משמרת",ds:"הלב של המשמרת",primary:true},
    'coach-eval':     {ic:"⭐",lb:"הערכת מאמן",ds:"מבוסס L2"},
    'sales-summary':  {ic:"🧡",lb:"סיכום שירות/מכירה",ds:"סיכום היום",primary:true},
    'helper-checklist':{ic:"🧹",lb:"צ'קליסט נער עזר",ds:"תחזוקה + משימות",primary:true},
    'inventory':      {ic:"📦",lb:"עדכון מלאי",ds:"מה לקחת?"},
  },
  view:{
    'feed':{ic:"🗂️",lb:"פיד סיכומים",ds:"מה קרה במשמרות"},
    'review':{ic:"🔎",lb:"תור בקרה",ds:"לעדכן בארבוקס"},
    'inventory-status':{ic:"🚦",lb:"מצב מלאי",ds:"כמות מול מינימום"},
    'order-list':{ic:"🛒",lb:"מה להזמין",ds:"הגיע למינימום"},
    'payroll':{ic:"💰",lb:"שעון ושכר",ds:"שעות × תעריף"},
    'maint-summary':{ic:"📆",lb:"סיכום תחזוקה",ds:"יומי · שבועי · חודשי"},
    'dashboard':{ic:"📊",lb:"דשבורד ניהולי",ds:"מבט על"},
    'admin':{ic:"⚙️",lb:"מסך ניהול",ds:"צוות · צ'קליסט · מלאי"},
  }
};
const ROLE_ACTIONS = {
  manager:{do:['checklist-open','checklist-close','shift-summary','coach-eval','inventory'],
           view:['feed','review','inventory-status','order-list','maint-summary','dashboard','payroll','admin']},
  coach:  {do:['checklist-open','checklist-close','shift-summary','coach-eval','inventory'],
           view:['feed','inventory-status']},
  sales:  {do:['sales-summary'], view:['feed','review','inventory-status']},
  helper: {do:['helper-checklist'], view:['inventory-status','maint-summary','payroll']},
};
const ROUTE = {
  'checklist-open':()=>viewChecklist('open'),
  'checklist-close':()=>viewChecklist('close'),
  'shift-summary':viewShiftSummary, 'coach-eval':viewCoachEval,
  'sales-summary':viewSalesSummary, 'helper-checklist':viewHelper,
  'inventory':viewInventoryReport, 'feed':viewFeed, 'review':viewReview,
  'inventory-status':viewInventoryStatus, 'order-list':viewOrderList,
  'payroll':viewPayroll, 'maint-summary':viewMaintSummary, 'dashboard':viewDashboard, 'admin':viewAdmin,
};
const FREQ_LBL={daily:'יומי ☀️',weekly:'שבועי 📆',monthly:'חודשי 🗓️'};

/* ============================================================
   מצב ריצה
   ============================================================ */
let STAFF={}, CHECKS={}, INV={};   // config מהענן
let ME=null, pinBuffer="", pendingStaffId=null;
let ACTIVE_SHIFT=null;             // משמרת שעון פתוחה של המשתמש הנוכחי
const isHourly = me => me && (+me.rate)>0;

async function loadConfig(){
  const [st,ck,iv] = await Promise.all([cGet('staff'),cGet('checklist_items'),cGet('inventory_items')]);
  STAFF = (st&&Object.keys(st).length)?st:FALLBACK_STAFF;
  CHECKS = ck||{}; INV = iv||{};
}

/* ---------- עזרי תאריך/זמן ---------- */
function todayISO(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDate(iso){ if(!iso)return''; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function nowTime(){ const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function shiftNow(){
  const h=new Date().getHours();
  if(h>=5&&h<11) return {k:"morning",ic:"🌅",t:"משמרת בוקר",s:"הכל מוכן 55 דק' לפני — עד 05:55",def:"בוקר"};
  if(h>=15&&h<22) return {k:"evening",ic:"🌙",t:"משמרת ערב",s:"הכל מוכן 55 דק' לפני — עד 16:55",def:"ערב"};
  return {k:"off",ic:"☕",t:"מחוץ לשעות המשמרת",s:"בוקר 06:00–10:00 · ערב 16:00–21:00",def:"בוקר"};
}
function greet(){ const h=new Date().getHours(); return h<12?"בוקר טוב":h<17?"צהריים טובים":h<21?"ערב טוב":"לילה טוב"; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ============================================================
   התחברות
   ============================================================ */
function renderStaffPick(){
  const grid=document.getElementById('staff-grid');
  const list=Object.entries(STAFF).filter(([id,s])=>s.active).sort((a,b)=>(a[1].order||99)-(b[1].order||99));
  grid.innerHTML=list.map(([id,s])=>{
    const rc=(ROLES[s.role]||{}).color||"#888", he=(ROLES[s.role]||{}).he||s.role, ini=(s.name||"?").trim()[0];
    return `<button class="staff-btn" onclick="pickStaff('${id}')">
      <span class="av" style="background:${rc}">${ini}</span><span>${esc(s.name)}</span><span class="rl">${he}</span></button>`;
  }).join('');
}
function buildPad(){
  const pad=document.getElementById('pad');
  pad.innerHTML=[1,2,3,4,5,6,7,8,9,'ghost',0,'del'].map(k=>
    k==='ghost'?`<button class="ghost" disabled></button>`:
    k==='del'?`<button onclick="pinDel()">⌫</button>`:
    `<button onclick="pinPress(${k})">${k}</button>`).join('');
}
function pickStaff(id){
  const s=STAFF[id];
  if(s.role!=='manager'){ localStorage.setItem('bux_ops_me',id); loginAs(id); return; } // כניסה מהירה בלחיצת שם
  pendingStaffId=id;pinBuffer="";document.getElementById('pin-name').textContent=s.name;
  updateDots();document.getElementById('who-pick').classList.add('hidden');document.getElementById('pin-wrap').classList.remove('hidden'); }
function backToPick(){ document.getElementById('pin-wrap').classList.add('hidden');document.getElementById('who-pick').classList.remove('hidden');pinBuffer="";pendingStaffId=null; }
function pinPress(n){ if(pinBuffer.length>=4)return;pinBuffer+=n;updateDots();if(pinBuffer.length===4)setTimeout(checkPin,120); }
function pinDel(){ pinBuffer=pinBuffer.slice(0,-1);updateDots(); }
function updateDots(){ const d=document.getElementById('pin-dots');d.classList.remove('err');[...d.children].forEach((x,i)=>x.classList.toggle('on',i<pinBuffer.length)); }
function checkPin(){
  const s=STAFF[pendingStaffId];
  if(s&&pinBuffer===String(s.pin)){ if(document.getElementById('stay').checked)localStorage.setItem('bux_ops_me',pendingStaffId); loginAs(pendingStaffId); }
  else{ document.getElementById('pin-dots').classList.add('err');pinBuffer="";setTimeout(updateDots,400); }
}
function loginAs(id){
  ME={id,...STAFF[id]};
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('screen-app').classList.remove('hidden');
  const rc=(ROLES[ME.role]||{}).color||"#888";
  document.getElementById('t-av').textContent=(ME.name||"?").trim()[0];
  document.getElementById('t-av').style.background=rc;
  document.getElementById('t-name').textContent=ME.name;
  document.getElementById('t-role').textContent=(ROLES[ME.role]||{}).he||ME.role;
  ACTIVE_SHIFT=null;
  viewHome(); window.scrollTo(0,0);
  // טעינת מצב שעון עבודה (לעובדים שעתיים) ורענון הווידג'ט
  if(isHourly(ME)) cGet('time_active/'+ME.id).then(a=>{ ACTIVE_SHIFT=a||null;
    const w=document.getElementById('clock-wrap'); if(w) w.innerHTML=renderClockWidget(); });
}
function logout(){ localStorage.removeItem('bux_ops_me');ME=null;
  document.getElementById('screen-app').classList.add('hidden');document.getElementById('screen-login').classList.remove('hidden');backToPick(); }

/* ============================================================
   ניווט
   ============================================================ */
const V=()=>document.getElementById('view');
function go(action){ (ROUTE[action]||viewHome)(); window.scrollTo(0,0); }
function vhead(title,sub,refresh){ return `<div class="vhead"><button class="back" onclick="viewHome()">→</button>
  <div><h2>${title}</h2>${sub?`<div class="sub">${sub}</div>`:''}</div>
  ${refresh?`<div class="spc"></div><button class="refresh" onclick="${refresh}" title="רענון">⟳</button>`:''}</div>`; }
function loading(){ V().innerHTML=`<div class="loading">טוען… 🧡</div>`; }
/* שליחה בטוחה: מונע לחיצה כפולה, מחכה לאישור אמיתי מהענן, ומודיע על כשל בלי לרמות */
async function withBusy(btn,fn){
  if(btn&&btn._busy) return false;
  if(btn){ btn._busy=true; btn._t=btn.textContent; btn.disabled=true; btn.textContent='שולח… ⏳'; }
  try{ await fn(); return true; }
  catch(e){ toast('❌ אין חיבור — לא נשלח, נסה/י שוב'); return false; }
  finally{ if(btn){ btn.disabled=false; btn.textContent=btn._t; btn._busy=false; } }
}
function toast(msg){ const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200); }
function sheet(title,body,btn="הבנתי 🧡",cb){
  const bg=document.createElement('div');bg.className='modal-bg';
  bg.innerHTML=`<div class="sheet" onclick="event.stopPropagation()"><div class="grip"></div>
    <h3>${title}</h3><p>${body}</p><button class="ok">${btn}</button></div>`;
  bg.onclick=()=>bg.remove(); bg.querySelector('.ok').onclick=()=>{bg.remove();if(cb)cb();};
  document.body.appendChild(bg);
}

/* ---------- בית ---------- */
function viewHome(){
  const conf=ROLE_ACTIONS[ME.role]||{do:[],view:[]}, sh=shiftNow();
  const card=(key,kind,wide=false)=>{ const a=ACTIONS[kind][key]; if(!a)return"";
    const cls=["action",wide?"wide":"",a.primary?"primary":""].join(" ");
    const badge = (key==='review'&&window._pendCount)?`<span class="cnt">${window._pendCount}</span>`:'';
    return `<button class="${cls}" onclick="go('${key}')">${badge}<span class="ic">${a.ic}</span>
      <span><span class="lb">${a.lb}</span>${a.ds?`<br><span class="ds">${a.ds}</span>`:""}</span></button>`; };
  let h=`<div class="shift-banner ${sh.k}"><span class="big">${sh.ic}</span>
    <span><b>${greet()}, ${esc(ME.name.split(' ')[0])}</b> · ${sh.t}<br>
    <span style="font-weight:500;opacity:.85">${sh.s}</span></span></div>`;
  if(isHourly(ME)) h+=`<div id="clock-wrap">${renderClockWidget()}</div>`;
  if(conf.do.length){ h+=`<div class="sec-title">מה ממלאים היום ✍️</div><div class="actions">`+conf.do.map(k=>card(k,'do')).join('')+`</div>`; }
  if(conf.view.length){ h+=`<div class="sec-title">צפייה ומעקב 👀</div><div class="actions">`+conf.view.map(k=>card(k,'view',k==='admin')).join('')+`</div>`; }
  V().innerHTML=h;
  // עדכון מונה תור בקרה ברקע
  if(conf.view.includes('review')) refreshPendCount();
}
async function refreshPendCount(){
  const s=await cGet('shift_summaries')||{};
  window._pendCount=Object.values(s).filter(x=>x.status==='pending').length;
  const el=document.querySelector(".action .cnt"); // רענון קל
  if(ME) { const btn=[...document.querySelectorAll('.action')].find(b=>b.getAttribute('onclick')==="go('review')");
    if(btn){ btn.querySelector('.cnt')?.remove(); if(window._pendCount){ const c=document.createElement('span');c.className='cnt';c.textContent=window._pendCount;btn.appendChild(c);} } }
}

/* ============================================================
   שעון עבודה + שכר
   ============================================================ */
function hhmm(ts){ const d=new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function elapsedStr(ms){ const s=Math.max(0,Math.floor(ms/1000)); const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; }
function hm(mins){ mins=Math.round(+mins||0); const h=Math.floor(mins/60),m=mins%60; return h?`${h}ש ${m}ד`:`${m} דק'`; }
function money(mins,rate){ return Math.round((mins/60)*(+rate||0)); }
function weekStartTs(){ const d=new Date(); d.setDate(d.getDate()-d.getDay()); d.setHours(0,0,0,0); return d.getTime(); } // ראשון
function monthStartTs(){ const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),1).getTime(); }

function renderClockWidget(){
  if(!isHourly(ME)) return '';
  if(ACTIVE_SHIFT&&ACTIVE_SHIFT.start){
    return `<div class="clock on">
      <div class="clk-state">▶️ במשמרת · התחלת ב-${hhmm(ACTIVE_SHIFT.start)}</div>
      <div class="clk-time" id="clock-elapsed">${elapsedStr(Date.now()-ACTIVE_SHIFT.start)}</div>
      <button class="clk-btn stop" onclick="clockOut(this)">⏹️ סיום משמרת</button></div>`;
  }
  return `<div class="clock"><div class="clk-state">🕒 שעון עבודה</div>
    <button class="clk-btn start" onclick="clockIn(this)">▶️ התחל משמרת</button></div>`;
}
async function clockIn(btn){
  const rec={start:Date.now(),date:todayISO()};
  const ok=await withBusy(btn,()=>cPut('time_active/'+ME.id,rec));
  if(ok){ ACTIVE_SHIFT=rec; const w=document.getElementById('clock-wrap'); if(w)w.innerHTML=renderClockWidget(); toast('▶️ משמרת התחילה — בהצלחה!'); }
}
async function clockOut(btn){
  if(!ACTIVE_SHIFT||!ACTIVE_SHIFT.start) return;
  const start=ACTIVE_SHIFT.start, end=Date.now(), minutes=Math.max(1,Math.round((end-start)/60000)), date=ACTIVE_SHIFT.date||todayISO();
  const iv=await cGet('inventory_items')||INV; INV=iv||INV;
  const orders=Object.values(iv||{}).filter(it=>it&&it.active&&invStatus(it.qty,it.min)==='order').map(it=>it.name);
  const ok=await withBusy(btn,()=>Promise.all([
    cPush('time_shifts',{staffId:ME.id,name:ME.name,start,end,minutes,date,ts:end}),
    cPush('helper_reports',{staffId:ME.id,name:ME.name,date,minutes,orders,ts:end}),
    cDel('time_active/'+ME.id)
  ]));
  if(ok){ ACTIVE_SHIFT=null; const w=document.getElementById('clock-wrap'); if(w)w.innerHTML=renderClockWidget();
    let body=`עבדת <b>${hm(minutes)}</b> 💪 · שכר: ₪${money(minutes,ME.rate)}<br>`;
    body+= orders.length? `<br>🛒 סיכום למנהל — צריך להזמין:<br><b>${orders.map(esc).join(' · ')}</b>` : '<br>מלאי מלא — אין מה להזמין ✅';
    sheet('סיום משמרת ✅', body, 'סיימתי 🧡', viewHome);
  }
}
async function viewPayroll(){
  loading();
  const shifts=await cGet('time_shifts')||{};
  const all=Object.values(shifts), isMgr=ME.role==='manager';
  const t=todayISO(), ws=weekStartTs(), ms=monthStartTs();
  let h=vhead("שעון ושכר 💰","שעות עבודה × תעריף לשעה","viewPayroll()");
  const targets = isMgr ? Object.entries(STAFF).filter(([id,s])=>(+s.rate)>0).sort((a,b)=>(a[1].order||99)-(b[1].order||99)).map(([id])=>id) : [ME.id];
  if(!targets.length){ h+=`<div class="empty"><span class="e">💰</span>אין עובדים שעתיים מוגדרים</div>`; V().innerHTML=h; return; }
  targets.forEach(id=>{
    const s=STAFF[id]||{}, r=+s.rate||0;
    const mine=all.filter(x=>x.staffId===id);
    const sum=pred=>mine.filter(pred).reduce((a,x)=>a+(+x.minutes||0),0);
    const dToday=sum(x=>x.date===t), dWeek=sum(x=>(x.ts||x.end||0)>=ws), dMonth=sum(x=>(x.ts||x.end||0)>=ms);
    if(isMgr) h+=`<div class="sec-title">${esc(s.name)} · ₪${r}/שעה</div>`;
    h+=`<div class="kpis">
      <div class="kpi"><div class="v">${hm(dToday)}</div><div class="l">היום</div></div>
      <div class="kpi"><div class="v">${hm(dWeek)}</div><div class="l">השבוע</div></div>
      <div class="kpi good"><div class="v">${hm(dMonth)}</div><div class="l">החודש</div></div>
      <div class="kpi"><div class="v">₪${money(dMonth,r)}</div><div class="l">שכר החודש</div></div></div>`;
    if(!isMgr){
      const recent=mine.sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,12);
      if(recent.length){ h+=`<div class="sec-title">משמרות אחרונות</div><div class="card-list">`+
        recent.map(x=>`<div class="inv-row"><span class="nm">${fmtDate(x.date)}</span>
          <span class="st ok">${hhmm(x.start)}–${hhmm(x.end)} · ${hm(x.minutes)}</span></div>`).join('')+`</div>`; }
    }
  });
  V().innerHTML=h;
}

/* ---------- רכיבי טופס ---------- */
function seg(group,opts,def){ return `<div class="seg" data-group="${group}">`+opts.map(o=>
  `<button type="button" class="seg-b${o===def?' sel':''}" data-val="${esc(o)}" onclick="segPick(this,'${group}')">${esc(o)}</button>`).join('')+`</div>`; }
function segYN(group,def){ return `<div class="seg yn" data-group="${group}">`+['כן','לא'].map(o=>
  `<button type="button" class="seg-b${o===def?' sel':''}" data-val="${o}" onclick="segPick(this,'${group}')">${o}</button>`).join('')+`</div>`; }
let SEG_HOOK={};
function segPick(b,group){ [...b.parentElement.children].forEach(c=>c.classList.remove('sel'));b.classList.add('sel');
  if(SEG_HOOK[group])SEG_HOOK[group](b.dataset.val); }
function segVal(group){ const el=document.querySelector(`.seg[data-group="${group}"] .seg-b.sel`);return el?el.dataset.val:null; }

const RUBRIC=[
 {k:'r1',t:'נוכחות, יחס וקשר',w:20,l:['מנותק','נוכח לא יוזם','אנרגטי ומחובר','מוביל אווירה']},
 {k:'r2',t:'הדגמה ומקצועיות אישית',w:20,l:['שגויה','בסיסית','נקייה עם נק׳ ביצוע','מופתית + מודל אישי']},
 {k:'r3',t:'ניהול קבוצה וקצב',w:15,l:['כאוטי','פערים','מאורגן וזורם','שליטה מלאה']},
 {k:'r4',t:'הוראה (Teaching)',w:15,l:['מבלבל','עמוס','ברור וממוקד','cues חדים · progression מושלם']},
 {k:'r5',t:'ראייה (Seeing)',w:15,l:['מפספס','בולטות בלבד','מזהה מרובים','major-fault-first ומתעדף']},
 {k:'r6',t:'תיקון וסקיילינג',w:15,l:['לא/שגוי','חלקי','אפקטיבי','מדויק + סקיילינג ששומר על ביצוע']},
];
let RUBRIC_SCORES={};
function viewCoachEval(){
  RUBRIC_SCORES={};
  const coaches=Object.entries(STAFF).filter(([id,s])=>s.active&&(s.role==='coach'||s.role==='manager'));
  let h=vhead("הערכת מאמן ⭐","מבוסס מתודולוגיית CrossFit L2");
  h+=`<div class="field"><label>תאריך</label><input type="date" id="date" value="${todayISO()}"></div>`;
  h+=`<div class="field"><label>מוערך/ת <span class="req">*</span></label><select id="ratee"><option value="">בחר/י מאמן/ת…</option>`+
    coaches.map(([id,s])=>`<option value="${esc(s.name)}">${esc(s.name)}</option>`).join('')+`</select></div>`;
  h+=`<div class="field"><label>מעריך/ה</label><input type="text" value="${esc(ME.name)}" disabled></div>`;
  h+=`<div class="field"><label>הקשר</label>${seg('ctx',['תצפית חפיפה','אימון בפיקוח','אימון מלא'])}</div>`;
  h+=`<div class="field"><label>האימון והתנועות שנצפו</label><textarea id="wod" placeholder="למשל: Fran — Thruster + Pull-up…"></textarea></div>`;
  h+=`<div class="sec-title">רובריקה — 1 עד 4</div>`;
  h+=RUBRIC.map(r=>`<div class="rubric"><div class="rt">${r.t}</div><div class="rw">משקל ${r.w}%</div>
    <div class="nums">`+[1,2,3,4].map(n=>`<button type="button" class="nb" data-r="${r.k}" data-n="${n}" onclick="rubricPick('${r.k}',${n},this)">${n}</button>`).join('')+
    `</div><div class="rl" id="rl-${r.k}"></div></div>`).join('');
  h+=`<div class="sec-title">בטיחות והיררכיה</div>`;
  h+=`<div class="field"><label>היו סיכוני בטיחות שלא טופלו? <span class="req">*</span></label><div class="hint">"כן" = דגל אדום, ללא תלות בציון</div>${segYN('safety','לא')}</div>`;
  h+=`<div class="field"><label>מכניקה → עקביות → אינטנסיביות: נשמר הסדר?</label>${seg('hier',['כן','חלקית','לא'])}</div>`;
  h+=`<div class="sec-title">איכותני</div>`;
  h+=`<div class="field"><label>חוזקות</label><textarea id="strong"></textarea></div>`;
  h+=`<div class="field"><label>נקודות לשיפור</label><textarea id="improve"></textarea></div>`;
  h+=`<div class="field"><label>הערות / סיכום שיחה</label><textarea id="talk"></textarea></div>`;
  h+=`<div class="field"><label>יעד אחד קונקרטי להמשך 🎯</label><input type="text" id="goal" placeholder="מטרה אחת ברורה…"></div>`;
  h+=`<div class="sec-title">מסקנה</div>`;
  h+=`<div class="field"><label>המלצה</label>${seg('rec',['מוכן לשלב הבא','להמשיך חפיפה','דורש שיחה'])}</div>`;
  h+=`<div class="field"><label>תאריך מעקב</label><input type="date" id="followup"></div>`;
  h+=`<div class="score-box"><div class="sv" id="score">—</div><div class="sl">ציון משוקלל (מתוך 4)</div>
    <div class="verdict" id="verdict" style="display:none"></div></div>`;
  h+=`<button class="submit" onclick="submitEval(this)">שמירת הערכה ✅</button>`;
  V().innerHTML=h;
  SEG_HOOK['safety']=()=>updateScore();
}
function rubricPick(k,n,btn){ RUBRIC_SCORES[k]=n;
  [...btn.parentElement.children].forEach(c=>c.classList.remove('sel'));btn.classList.add('sel');
  const r=RUBRIC.find(x=>x.k===k); document.getElementById('rl-'+k).textContent=r.l[n-1]; updateScore(); }
function calcScore(){ let s=0,haveAll=true; RUBRIC.forEach(r=>{ if(RUBRIC_SCORES[r.k])s+=RUBRIC_SCORES[r.k]*r.w/100; else haveAll=false; }); return {s,haveAll}; }
function updateScore(){
  const {s,haveAll}=calcScore(); document.getElementById('score').textContent=haveAll?s.toFixed(2):'—';
  const vd=document.getElementById('verdict'); const safety=segVal('safety');
  if(haveAll){ const pass=(s>=3.0 && safety!=='כן'); vd.style.display='block';
    vd.className='verdict '+(pass?'ok':'no'); vd.textContent=pass?'רשאי/ת להעביר לבד ✅':(safety==='כן'?'דגל בטיחות אדום ⛔':'עדיין לא — להמשיך חפיפה ⛔'); }
  else vd.style.display='none';
}
async function submitEval(btn){
  if(!document.getElementById('ratee').value)return toast('בחר/י מי מוערך/ת');
  const {s,haveAll}=calcScore(); if(!haveAll)return toast('מלא/י את כל 6 הקריטריונים');
  if(!segVal('safety'))return toast('ענה/י על שאלת הבטיחות');
  const safety=segVal('safety'), pass=(s>=3.0 && safety!=='כן');
  const ok=await withBusy(btn,()=>cPush('coach_evaluations',{ratee:document.getElementById('ratee').value,rater:ME.name,date:document.getElementById('date').value,
    ctx:segVal('ctx'),wod:document.getElementById('wod').value.trim(),scores:{...RUBRIC_SCORES},weighted:+s.toFixed(2),
    safety,hier:segVal('hier'),strong:document.getElementById('strong').value.trim(),improve:document.getElementById('improve').value.trim(),
    talk:document.getElementById('talk').value.trim(),goal:document.getElementById('goal').value.trim(),rec:segVal('rec'),
    followup:document.getElementById('followup').value,soloOk:pass,ts:Date.now()}));
  if(ok) sheet(pass?'הערכה נשמרה ✅':'הערכה נשמרה','ציון משוקלל: '+s.toFixed(2)+' מתוך 4'+(pass?' · רשאי/ת להעביר לבד':' · עדיין בחפיפה'),'חזרה לבית',viewHome);
}

/* ============================================================
   מלאי כמותי — לכל פריט כמות + מינימום; לקיחה מורידה מהכמות
   ============================================================ */
function invItems(){ return Object.entries(INV).filter(([id,i])=>i.active).sort((a,b)=>(a[1].order||99)-(b[1].order||99)); }
function invStatus(qty,min){ qty=+qty||0; min=+min||0; if(qty<=min) return 'order'; if(qty<=min*2) return 'low'; return 'ok'; }
const INV_LBL={ok:'תקין',low:'עומד להיגמר',order:'צריך להזמין'};

function viewInventoryReport(){
  let h=vhead("עדכון מלאי 📦","סמן/י כמה לקחת — הכמות תרד ותתעדכן לכולם");
  h+=`<div class="hint" style="margin-bottom:12px">ליד כל פריט רשום כמה נשאר. אם לקחת — עדכן/י כמה לקחת עם ➖/➕.</div>`;
  h+=`<div class="card-list">`+invItems().map(([id,it])=>{
    const qty=+it.qty||0, st=invStatus(qty,it.min);
    return `<div class="inv-take ${st}" data-id="${id}">
      <div class="it-top"><span class="nm">${esc(it.name)}</span><span class="left st ${st==='order'?'out':st}">נשאר: ${qty}</span></div>
      <div class="stepper"><span class="stp-lbl">כמה לקחת?</span>
        <button type="button" class="stp" onclick="stepTake('${id}',-1)">−</button>
        <input type="number" class="take" id="take-${id}" value="0" min="0" max="${qty}" inputmode="numeric" readonly>
        <button type="button" class="stp" onclick="stepTake('${id}',1)">＋</button></div></div>`;
  }).join('')+`</div>`;
  h+=`<div class="field" style="margin-top:14px"><label>הערות</label><textarea id="invNote" placeholder="למשל: שברתי בקבוק, פתחתי חבילה חדשה…"></textarea></div>`;
  h+=`<button class="submit" onclick="submitInv(this)">עדכון מלאי ✅</button>`;
  V().innerHTML=h;
}
function stepTake(id,d){ const el=document.getElementById('take-'+id); const max=+el.max||0;
  el.value=Math.max(0,Math.min(max,(+el.value||0)+d));
  el.closest('.inv-take').style.borderColor = (+el.value>0)?'var(--orange)':''; }
async function submitInv(btn){
  const changes=[];
  invItems().forEach(([id,it])=>{ const taken=+document.getElementById('take-'+id).value||0;
    if(taken>0) changes.push({id,name:it.name,taken,newQty:Math.max(0,(+it.qty||0)-taken)}); });
  if(!changes.length) return toast('לא סימנת שלקחת משהו');
  const note=document.getElementById('invNote').value.trim();
  const ok=await withBusy(btn,()=>Promise.all([
    ...changes.map(c=>cPatch('inventory_items/'+c.id,{qty:c.newQty})),
    cPush('inventory_txns',{staffId:ME.id,name:ME.name,type:'take',date:todayISO(),time:nowTime(),
      items:changes.map(c=>({id:c.id,name:c.name,taken:c.taken,left:c.newQty})),note,ts:Date.now()})
  ]));
  if(ok){ changes.forEach(c=>{ if(INV[c.id]) INV[c.id].qty=c.newQty; });
    const orders=invItems().filter(([id,it])=>invStatus(it.qty,it.min)==='order').map(([id,it])=>it.name);
    sheet('מלאי עודכן ✅', changes.map(c=>`${esc(c.name)}: נשאר ${c.newQty}`).join('<br>')+
      (orders.length?`<br><br>🛒 צריך להזמין: <b>${orders.map(esc).join(' · ')}</b>`:''),'חזרה לבית',viewHome);
  }
}

  ['daily','weekly','monthly'].forEach(f=>{ if(byFreq[f].length){
    h+=`<div class="sec-title">${FREQ_LBL[f]}</div><div class="check-list">`+byFreq[f].map(([id,c])=>
      `<div class="check" data-id="${id}" onclick="toggleCheck(this)"><div class="box">✓</div>

async function submitHelper(btn){
  const checked=[...V().querySelectorAll('.check.on')].map(e=>e.dataset.id);
  const changes=[];
  invItems().forEach(([id,it])=>{ const t=+document.getElementById('take-'+id).value||0;
    if(t>0) changes.push({id,name:it.name,taken:t,newQty:Math.max(0,(+it.qty||0)-t)}); });
  const note=document.getElementById('helperTasks').value.trim();
  const ops=[cPush('checklist_submissions',{staffId:ME.id,name:ME.name,type:'maint',shift:'—',date:todayISO(),time:nowTime(),
    checked,total:V().querySelectorAll('.check').length,note,ts:Date.now()})];
  changes.forEach(c=>ops.push(cPatch('inventory_items/'+c.id,{qty:c.newQty})));
  if(changes.length) ops.push(cPush('inventory_txns',{staffId:ME.id,name:ME.name,type:'take',date:todayISO(),time:nowTime(),
    items:changes.map(c=>({id:c.id,name:c.name,taken:c.taken,left:c.newQty})),note,ts:Date.now()}));
  const ok=await withBusy(btn,()=>Promise.all(ops));
  if(ok){ changes.forEach(c=>{ if(INV[c.id]) INV[c.id].qty=c.newQty; });
    sheet('נשלח! ✅',`כל הכבוד ${esc(ME.name.split(' ')[0])} 🧡`+
      (changes.length?`<br><br>📦 עודכן מלאי:<br>${changes.map(c=>esc(c.name)+' → נשאר '+c.newQty).join('<br>')}`:''),'חזרה לבית',viewHome);
  }
}

function renderMaintSummary(){

    <div class="kpi"><div class="v">${totalTaken}</div><div class="l">יח' מלאי שנלקחו</div></div></div>`;

  h+=`<div class="card-list">`+sList.map(x=>{

let FEED_ITEMS=[], FEED_DATE='';
async function viewFeed(){
  loading();
  const [shifts,sales]=await Promise.all([cGet('shift_summaries'),cGet('sales_summaries')]);
  FEED_ITEMS=[];
  Object.entries(shifts||{}).forEach(([id,s])=>FEED_ITEMS.push({id,kind:'shift',...s}));
  Object.entries(sales||{}).forEach(([id,s])=>FEED_ITEMS.push({id,kind:'sales',...s}));
  FEED_ITEMS.sort((a,b)=>(b.ts||0)-(a.ts||0));
  renderFeed();
}
function dateLabel(iso){
  if(!iso) return '';
  if(iso===todayISO()) return 'היום · '+fmtDate(iso);
  const d=new Date(); d.setDate(d.getDate()-1);
  const y=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  if(iso===y) return 'אתמול · '+fmtDate(iso);
  return fmtDate(iso);
}
function renderFeed(){
  let h=vhead("פיד סיכומים 🗂️","מה קרה במשמרות — הכי חדש למעלה","viewFeed()");
  h+=`<div class="datebar"><input type="date" id="feedDate" value="${FEED_DATE}" onchange="FEED_DATE=this.value;renderFeed()">
    ${FEED_DATE?`<button class="db-clear" onclick="FEED_DATE='';renderFeed()">כל התאריכים ✕</button>`:''}</div>`;
  let items=FEED_DATE?FEED_ITEMS.filter(x=>x.date===FEED_DATE):FEED_ITEMS;
  if(!items.length){ h+=`<div class="empty"><span class="e">🗂️</span>${FEED_DATE?'אין סיכומים לתאריך שנבחר':'עוד אין סיכומים.<br>המאמנים ימלאו בסוף המשמרת.'}</div>`; V().innerHTML=h; window.scrollTo(0,0); return; }
  h+=`<div class="card-list">`;
  let lastDate=null;
  items.forEach(it=>{
    if(it.date!==lastDate){ lastDate=it.date; h+=`<div class="date-sep">📅 ${dateLabel(it.date)}</div>`; }
    h+= it.kind==='shift'?shiftCard(it,true):salesCard(it);
  });
  h+=`</div>`;
  V().innerHTML=h; window.scrollTo(0,0);
}
async function ackSeen(id){
  try{
    const cur=await cGet('shift_summaries/'+id+'/seenBy');
    const arr=Array.isArray(cur)?cur:[];
    if(!arr.includes(ME.name)) arr.push(ME.name);
    await cPut('shift_summaries/'+id+'/seenBy', arr);
    const it=FEED_ITEMS.find(x=>x.id===id); if(it) it.seenBy=arr;
    toast('👁 סומן שראית'); renderFeed();
  }catch(e){ toast('❌ אין חיבור — נסה/י שוב'); }
}
function shiftCard(s, feed){
  const sc=s.shift==='בוקר'?'morning':'evening';
  let h=`<div class="rec"><div class="rtop"><span class="who">${esc(s.name)}</span>
    <span class="chip ${sc}">${esc(s.shift)}</span>
    <span class="chip ${s.status==='done'?'done':'pending'}">${s.status==='done'?'טופל ✓':'ממתין לבקרה'}</span>
    ${s.injury==='כן'?'<span class="chip injury">פציעה ⚠️</span>':''}
    ${s.trial==='כן'?'<span class="chip trial-chip">ניסיון 🎯</span>':''}
    <span class="spacer"></span><span class="meta">${fmtDate(s.date)}</span></div>`;
  if(s.handoff) h+=`<div class="handoff"><b>חשוב להעביר הלאה ➡️</b>${esc(s.handoff)}</div>`;
  if(s.trial==='כן'){
    h+=`<div class="trial"><b class="h">🎯 אימון ניסיון</b>`;
    if(s.trialName) h+=`<div><b>מי:</b> ${esc(s.trialName)}</div>`;
    if(s.trialHow) h+=`<div><b>איך היה:</b> ${esc(s.trialHow)}</div>`;
    if(s.trialNext) h+=`<div><b>להעביר הלאה:</b> ${esc(s.trialNext)}</div>`;
    h+=`</div>`;
  }
  const rows=[['מעורבות',s.involve],['איכות',s.quality],['שיעורים',s.classes],['תחושה',s.feel]].filter(r=>r[1]);
  h+=rows.map(r=>`<div class="row"><b>${r[0]}:</b> ${esc(r[1])}</div>`).join('');
  if(s.injury==='כן'&&s.injuryTxt) h+=`<div class="row"><b>פציעה:</b> ${esc(s.injuryTxt)}</div>`;
  if(s.attention) h+=`<div class="row"><b>למעקב:</b> ${esc(s.attention)}</div>`;
  if(s.pro) h+=`<div class="row"><b>מקצועי:</b> ${esc(s.pro)}</div>`;
  if(s.stars) h+=`<div class="row"><b>בלטו ⭐:</b> ${esc(s.stars)}</div>`;
  const seen=Array.isArray(s.seenBy)?s.seenBy:[];
  if(seen.length) h+=`<div class="row"><b>👁 ראו:</b> ${seen.map(esc).join(', ')}</div>`;
  if(feed){
    if(seen.includes(ME.name)) h+=`<div class="seen-done">✓ ראית את הסיכום הזה</div>`;
    else if(s.name!==ME.name) h+=`<button class="seen-btn" onclick="ackSeen('${s.id}')">👁 סמן שראיתי</button>`;
  }
  h+=`</div>`; return h;
}
function salesCard(s){
  let h=`<div class="rec"><div class="rtop"><span class="who">${esc(s.name)}</span>
    <span class="chip gray">שירות/מכירה 🧡</span><span class="spacer"></span><span class="meta">${fmtDate(s.date)}</span></div>`;
  const rows=[['לידים',s.leads],['מכירות',s.sales],['ביטול/הקפאה',s.issues],['משימות פתוחות',s.tasks],['הערות',s.notes]].filter(r=>r[1]);
  h+=rows.map(r=>`<div class="row"><b>${r[0]}:</b> ${esc(r[1])}</div>`).join('');
  if(s.leadsTxt) h+=`<div class="row"><b>פירוט לידים:</b> ${esc(s.leadsTxt)}</div>`;
  h+=`</div>`; return h;
}

async function restock(id){

  const newQty=(+it.qty||0)+n;
  try{ await cPatch('inventory_items/'+id,{qty:newQty}); INV[id].qty=newQty;
    await cPush('inventory_txns',{staffId:ME.id,name:ME.name,type:'restock',date:todayISO(),time:nowTime(),items:[{id,name:it.name,added:n,left:newQty}],ts:Date.now()});

    <button class="tab ${ADMIN_TAB==='staff'?'sel':''}" onclick="ADMIN_TAB='staff';viewAdmin()">צוות</button>
    <button class="tab ${ADMIN_TAB==='checks'?'sel':''}" onclick="ADMIN_TAB='checks';viewAdmin()">צ'קליסטים</button>
    <button class="tab ${ADMIN_TAB==='inv'?'sel':''}" onclick="ADMIN_TAB='inv';viewAdmin()">מלאי</button></div>`;
  h+=`<div id="adm-body"></div>`;
  V().innerHTML=h;
  if(ADMIN_TAB==='staff')admStaff(); else if(ADMIN_TAB==='checks')admChecks(); else admInv();
}
/* --- צוות --- */
function admStaff(){
  const list=Object.entries(STAFF).sort((a,b)=>(a[1].order||99)-(b[1].order||99));
  const roleOpts=Object.entries(ROLES).map(([k,v])=>`<option value="${k}">${v.he}</option>`).join('');
  let h=`<div class="hint" style="margin-bottom:12px">₪/שעה = תעריף לעובד שעתי (0 = לא שעתי). מי שיש לו תעריף מקבל שעון עבודה + שכר.</div>`;
  h+=list.map(([id,s])=>`<div class="adm-row" data-id="${id}">
    <div class="r1"><input type="text" class="f-name" value="${esc(s.name)}" placeholder="שם" style="flex:1">
      <input type="text" class="f-pin" value="${esc(s.pin)}" placeholder="PIN" style="width:70px" inputmode="numeric" maxlength="4"></div>
    <div class="r1"><select class="f-role" style="flex:1">${roleOpts.replace(`value="${s.role}"`,`value="${s.role}" selected`)}</select>
      <label class="qm">₪/ש<input type="number" class="f-rate" value="${+s.rate||0}" inputmode="numeric"></label>
      <label class="toggle"><input type="checkbox" class="f-active" ${s.active?'checked':''}>פעיל</label></div>
    <div class="r1"><span style="flex:1"></span>
      <button class="save" onclick="saveStaff('${id}')">שמור</button>
      <button class="del" onclick="delStaff('${id}')">מחק</button></div></div>`).join('');
  h+=`<button class="add-btn" onclick="addStaff()">＋ הוספת איש צוות</button>`;
  document.getElementById('adm-body').innerHTML=h;
}
async function saveStaff(id){
  const row=document.querySelector(`.adm-row[data-id="${id}"]`);
  const obj={name:row.querySelector('.f-name').value.trim(),pin:row.querySelector('.f-pin').value.trim(),
    role:row.querySelector('.f-role').value,rate:+row.querySelector('.f-rate').value||0,
    active:row.querySelector('.f-active').checked,order:STAFF[id].order||99};
  await cPut('staff/'+id,obj); STAFF[id]=obj; toast('נשמר ✓');
}
async function addStaff(){
  const id='s_'+Date.now(), order=Object.keys(STAFF).length+1;
  const obj={name:'חדש',pin:'0000',role:'coach',rate:0,active:true,order}; await cPut('staff/'+id,obj); STAFF[id]=obj; admStaff();
}
async function delStaff(id){
  if(!confirm('למחוק את '+STAFF[id].name+'?'))return;
  await cDel('staff/'+id); delete STAFF[id]; admStaff();
}
/* --- צ'קליסטים --- */
function admChecks(){
  const types={open:"פתיחה 🌅",close:"סגירה 🌙",maint:"תחזוקה 🧹"};
  let h=`<div class="sub-tabs">`+Object.entries(types).map(([k,v])=>
    `<button class="sub-tab ${ADMIN_CK===k?'sel':''}" onclick="ADMIN_CK='${k}';admChecks()">${v}</button>`).join('')+`</div>`;
  const list=Object.entries(CHECKS).filter(([id,c])=>c.type===ADMIN_CK).sort((a,b)=>(a[1].order||99)-(b[1].order||99));
  const freqSel=c=>ADMIN_CK==='maint'?`<select class="f-freq" style="flex:0 0 auto;width:96px">${
    Object.entries({daily:'יומי',weekly:'שבועי',monthly:'חודשי'}).map(([k,v])=>`<option value="${k}"${(c.freq||'daily')===k?' selected':''}>${v}</option>`).join('')}</select>`:'';
  h+=list.map(([id,c])=>`<div class="adm-row" data-id="${id}">
    <div class="r1"><input type="text" class="f-text" value="${esc(c.text)}" placeholder="המשימה" style="flex:1"></div>
    <div class="r1"><input type="text" class="f-help" value="${esc(c.help||'')}" placeholder="הסבר (רשות)" style="flex:1">${freqSel(c)}</div>
    <div class="r1"><span style="flex:1"></span>
      <label class="toggle"><input type="checkbox" class="f-active" ${c.active?'checked':''}>פעיל</label>
      <button class="save" onclick="saveCheck('${id}')">שמור</button>
      <button class="del" onclick="delCheck('${id}')">מחק</button></div></div>`).join('');
  h+=`<button class="add-btn" onclick="addCheck()">＋ הוספת משימה ל${types[ADMIN_CK]}</button>`;
  document.getElementById('adm-body').innerHTML=h;
}
async function saveCheck(id){
  const row=document.querySelector(`.adm-row[data-id="${id}"]`);
  const obj={type:CHECKS[id].type,text:row.querySelector('.f-text').value.trim(),help:row.querySelector('.f-help').value.trim(),
    active:row.querySelector('.f-active').checked,order:CHECKS[id].order||99};
  const fq=row.querySelector('.f-freq'); if(fq) obj.freq=fq.value;
  await cPut('checklist_items/'+id,obj); CHECKS[id]=obj; toast('נשמר ✓');
}
async function addCheck(){
  const id='c_'+Date.now(), order=Object.values(CHECKS).filter(c=>c.type===ADMIN_CK).length+1;
  const obj={type:ADMIN_CK,text:'משימה חדשה',help:'',active:true,order}; if(ADMIN_CK==='maint')obj.freq='daily';
  await cPut('checklist_items/'+id,obj); CHECKS[id]=obj; admChecks();
}
async function delCheck(id){ if(!confirm('למחוק את המשימה?'))return; await cDel('checklist_items/'+id); delete CHECKS[id]; admChecks(); }
/* --- מלאי --- */
function admInv(){
  const list=Object.entries(INV).sort((a,b)=>(a[1].order||99)-(b[1].order||99));
  let h=`<div class="hint" style="margin-bottom:12px">כמות = כמה יש עכשיו · מינימום = כשמגיעים אליו צריך להזמין.</div>`;
  h+=list.map(([id,it])=>`<div class="adm-row" data-id="${id}">
    <div class="r1"><input type="text" class="f-name" value="${esc(it.name)}" placeholder="שם הפריט" style="flex:1"></div>
    <div class="r1">
      <label class="qm">כמות<input type="number" class="f-qty" value="${+it.qty||0}" inputmode="numeric"></label>
      <label class="qm">מינ׳<input type="number" class="f-min" value="${+it.min||0}" inputmode="numeric"></label>
      <label class="toggle"><input type="checkbox" class="f-active" ${it.active?'checked':''}>פעיל</label>
      <button class="save" onclick="saveInv('${id}')">שמור</button>
      <button class="del" onclick="delInv('${id}')">מחק</button></div></div>`).join('');
  h+=`<button class="add-btn" onclick="addInv()">＋ הוספת פריט מלאי</button>`;
  document.getElementById('adm-body').innerHTML=h;
}
async function saveInv(id){
  const row=document.querySelector(`.adm-row[data-id="${id}"]`);
  const obj={name:row.querySelector('.f-name').value.trim(),qty:+row.querySelector('.f-qty').value||0,
    min:+row.querySelector('.f-min').value||0,active:row.querySelector('.f-active').checked,order:INV[id].order||99};
  await cPut('inventory_items/'+id,obj); INV[id]=obj; toast('נשמר ✓');
}
async function addInv(){
  const id='i_'+Date.now(), order=Object.keys(INV).length+1;
  const obj={name:'פריט חדש',qty:0,min:1,active:true,order}; await cPut('inventory_items/'+id,obj); INV[id]=obj; admInv();
}
async function delInv(id){ if(!confirm('למחוק את הפריט?'))return; await cDel('inventory_items/'+id); delete INV[id]; admInv(); }

/* ============================================================
   עמידות: אופליין, טיפול בכשלים, service worker
   ============================================================ */
function updateOnline(){ document.getElementById('offline').classList.toggle('show', !navigator.onLine); }
window.addEventListener('online', ()=>{ updateOnline(); toast('✅ החיבור חזר'); });
window.addEventListener('offline', updateOnline);
// כשל בכתיבה למסך הניהול (הפעולות שם קוראות ישירות לענן) — הודעה במקום כשל שקט
window.addEventListener('unhandledrejection', e=>{
  const msg=String(e&&e.reason&&e.reason.message||e.reason||'');
  if(msg.includes('net')||!navigator.onLine){ toast('❌ לא נשמר — בדוק/י חיבור'); e.preventDefault(); }
});
if('serviceWorker' in navigator){ window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }
// טיימר חי לשעון העבודה — מעדכן כל שנייה אם מוצג
setInterval(()=>{ const el=document.getElementById('clock-elapsed');
  if(el&&ACTIVE_SHIFT&&ACTIVE_SHIFT.start) el.textContent=elapsedStr(Date.now()-ACTIVE_SHIFT.start); },1000);

/* ============================================================
   אתחול
   ============================================================ */
(async function init(){
  buildPad();
  updateOnline();
  await loadConfig();
  const saved=localStorage.getItem('bux_ops_me');
  if(saved&&STAFF[saved]&&STAFF[saved].active) loginAs(saved);
  else renderStaffPick();
})();
</script>
</body>
